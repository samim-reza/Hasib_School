<td class="px-6 py-4 whitespace-nowrap font-semibold text-brand-sea">{{ student.roll_no }}</td>
<td class="px-6 py-4 whitespace-nowrap text-slate-700">{{ student.name }}</td>
<td class="px-6 py-4 whitespace-nowrap text-slate-700">{{ student.class_name }}</td>
<td class="px-6 py-4 whitespace-nowrap">
    <form hx-post="{% url 'academic:take_attendance' %}" hx-target="#student-row-{{ student.id }}" hx-swap="innerHTML" class="flex items-center space-x-2">
        {% csrf_token %}
        <input type="hidden" name="student_id" value="{{ student.id }}">
        <input type="hidden" name="class_name" value="{{ selected_class|default:student.class_name }}">
        
        <label class="inline-flex items-center">
            <input type="checkbox" name="is_present" onchange="this.form.dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}))" class="h-5 w-5 rounded border-emerald-300 text-emerald-600 focus:ring-emerald-500" {% if is_present or student.is_present_today %}checked{% endif %}>
            <span class="ml-2 text-slate-700">উপস্থিত</span>
        </label>
        
        {% if status == 'success' %}
            <span class="text-xs text-emerald-700 bg-emerald-100 px-2 py-1 rounded-full ml-2 transition-opacity duration-500">সংরক্ষিত</span>
        {% endif %}
    </form>
</td>
<td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
    <a href="{% url 'academic:remove_student' student.id %}?class_name={{ selected_class|default:student.class_name }}" onclick="return confirm('আপনি কি নিশ্চিত যে এই শিক্ষার্থীকে মুছে ফেলতে চান?');" class="text-rose-700 hover:text-rose-800 bg-rose-50 hover:bg-rose-100 px-3 py-1 rounded-full transition">মুছে ফেলুন</a>
</td>
